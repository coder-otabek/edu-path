<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>{% block title %}EduPath{% endblock %}</title>

    <!-- Zoom va klaviatura muammosini hal qilish -->
    <style>
        body {
            touch-action: pan-y;
            -webkit-user-scalable: none;
            user-scalable: none;
            -webkit-text-size-adjust: 100%;
        }

        html {
            -webkit-text-size-adjust: 100%;
        }

        /* Klaviatura ochilganda floating tugmalar uchun */
        .floating-btn, .chat-button, .fixed-bottom {
            position: fixed !important;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
        }

        /* iOS zoomni oldini olish */
        input:focus, textarea:focus {
            font-size: 16px !important;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
