<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ta'mirlash — {{ site.name|default:"EduPath" }}</title>
  {% load static %}
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Sora',sans-serif; background:#F8FAFF; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; text-align:center; }
    .wrap { max-width:380px; }
    .icon { font-size:4rem; margin-bottom:20px; }
    h1 { font-size:1.5rem; font-weight:800; color:#0F172A; margin-bottom:10px; }
    p { font-size:.875rem; color:#475569; line-height:1.7; }
    .badge { display:inline-block; background:#DBEAFE; color:#2563EB; padding:4px 12px; border-radius:100px; font-size:.75rem; font-weight:600; margin-top:20px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">🔧</div>
    <h1>{{ site.name|default:"EduPath" }} yangilanmoqda</h1>
    <p><span data-i18n="maintenance_desc">Sayt vaqtincha texnik ishlar uchun to'xtatilgan. Tez orada qaytamiz!</span></p>
    <div class="badge" data-i18n="maintenance_badge">Tez orada</div>
  </div>
</body>
</html>
